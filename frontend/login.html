<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 教育服务管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 420px; padding: 48px 40px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 28px; color: #333; margin-bottom: 8px; }
        .logo p { color: #999; font-size: 14px; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; margin-bottom: 8px; color: #666; font-size: 14px; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #e8e8e8; border-radius: 8px; font-size: 16px; transition: all 0.3s; outline: none; }
        .form-group input:focus { border-color: #667eea; }
        .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .message { margin-top: 16px; padding: 12px; border-radius: 8px; text-align: center; font-size: 14px; display: none; }
        .message.error { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }
        .message.success { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
        .register-link { text-align: center; margin-top: 20px; font-size: 14px; color: #999; }
        .register-link a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>教育服务管理系统</h1>
            <p>Educational Services Management System</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">登录</button>
            <div id="message" class="message"></div>
        </form>
        <div class="register-link">
            还没有账号？<a href="#" onclick="showRegister()">立即注册</a>
        </div>
    </div>

    <div class="login-container hidden" id="registerContainer" style="display:none">
        <div class="logo">
            <h1>用户注册</h1>
            <p>Create Your Account</p>
        </div>
        <form id="registerForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="regUsername" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="regPassword" placeholder="请输入密码" required>
            </div>
            <div class="form-group">
                <label>角色</label>
                <select id="regRole" style="width:100%;padding:14px 16px;border:2px solid #e8e8e8;border-radius:8px;font-size:16px;outline:none">
                    <option value="admin">管理员</option>
                    <option value="employee">员工</option>
                    <option value="student">学生</option>
                    <option value="teacher">教师</option>
                </select>
            </div>
            <button type="submit" class="btn-login" id="registerBtn">注册</button>
            <div id="regMessage" class="message"></div>
        </form>
        <div class="register-link">
            已有账号？<a href="#" onclick="showLogin()">立即登录</a>
        </div>
    </div>

    <script>
        const API_BASE = '';

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const message = document.getElementById('message');

            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                const res = await fetch(`${API_BASE}/user_permissions/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify({ user_id: data.user_id, username: data.username, role: data.role }));
                    message.className = 'message success';
                    message.textContent = '登录成功！正在跳转...';
                    message.style.display = 'block';
                    setTimeout(() => location.href = 'index.html', 1000);
                } else {
                    message.className = 'message error';
                    message.textContent = data.detail || '用户名或密码错误';
                    message.style.display = 'block';
                }
            } catch (err) {
                message.className = 'message error';
                message.textContent = '请求失败，请检查网络连接';
                message.style.display = 'block';
            }
            btn.disabled = false;
            btn.textContent = '登录';
        };

        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;
            const btn = document.getElementById('registerBtn');
            const message = document.getElementById('regMessage');

            btn.disabled = true;
            btn.textContent = '注册中...';

            try {
                const res = await fetch(`${API_BASE}/user_permissions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role })
                });
                const data = await res.json();

                if (res.ok) {
                    message.className = 'message success';
                    message.textContent = '注册成功！请登录';
                    message.style.display = 'block';
                    setTimeout(showLogin, 1500);
                } else {
                    message.className = 'message error';
                    message.textContent = data.detail || '注册失败';
                    message.style.display = 'block';
                }
            } catch (err) {
                message.className = 'message error';
                message.textContent = '请求失败，请检查网络连接';
                message.style.display = 'block';
            }
            btn.disabled = false;
            btn.textContent = '注册';
        };

        function showRegister() {
            document.getElementById('loginForm').parentElement.style.display = 'none';
            document.getElementById('registerContainer').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('loginForm').parentElement.style.display = 'block';
            document.getElementById('registerContainer').style.display = 'none';
            document.getElementById('regMessage').style.display = 'none';
        }
    </script>
</body>
</html>
